services:
  af-forge-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: af-forge-bridge
    restart: unless-stopped
    expose:
      - "7071"
    environment:
      - NODE_ENV=production
      - AF_FORGE_PORT=7071
      - AGENT_WORKBENCH_PROVIDER=${AGENT_WORKBENCH_PROVIDER:-mock}
      - AGENT_WORKBENCH_MODEL=${AGENT_WORKBENCH_MODEL:-gpt-5}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - HUMAN_ESCALATION_WEBHOOK_URL=${HUMAN_ESCALATION_WEBHOOK_URL:-}
      - ARIFOS_GOVERNANCE_URL=${ARIFOS_GOVERNANCE_URL:-http://arifos-mcp:8080}
      - AGENT_WORKBENCH_TRUST_LOCAL_VPS=${AGENT_WORKBENCH_TRUST_LOCAL_VPS:-0}
      - ENABLE_DANGEROUS_TOOLS=${ENABLE_DANGEROUS_TOOLS:-false}
      - ENABLE_BACKGROUND_JOBS=${ENABLE_BACKGROUND_JOBS:-false}
      - ENABLE_EXPERIMENTAL_TOOLS=${ENABLE_EXPERIMENTAL_TOOLS:-false}
      - AGENT_WORKBENCH_MEMORY_PATH=/data/memory.json
      - AGENT_WORKBENCH_SCOREBOARD_PATH=/data/scoreboard.json
      - AGENT_WORKBENCH_RUN_METRICS_DIR=/data/metrics
      - AGENT_WORKBENCH_DEFAULT_MODE=${AGENT_WORKBENCH_DEFAULT_MODE:-external}
      - POSTGRES_URL=${POSTGRES_URL:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - af-forge-data:/data
    networks:
      - af-forge-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7071/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  arifos-mcp:
    image: ariffazil/arifosmcp:latest
    container_name: af-forge-arifos-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-af_forge}:${POSTGRES_PASSWORD:-af_forge_secret}@postgres:5432/${POSTGRES_DB:-af_forge}
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - PYTHONPATH=/usr/src/project/arifosmcp:/usr/src/project
    volumes:
      - /root/arifOS-pr325/arifosmcp:/usr/src/project/arifosmcp:ro
      - /root/arifOS-pr325/core:/usr/src/project/core:ro
    networks:
      - af-forge-internal
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: af-forge-qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - af-forge-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: af-forge-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - af-forge-internal
    # No public port: internal network only
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # CPU-only deployment — no GPU reservations

  postgres:
    image: postgres:16-alpine
    container_name: af-forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-af_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-af_forge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-af_forge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - af-forge-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-af_forge} -d ${POSTGRES_DB:-af_forge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: af-forge-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - af-forge-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: af-forge-caddy
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - af-forge-internal
    depends_on:
      - af-forge-bridge
      - arifos-mcp

volumes:
  af-forge-data:
  ollama-data:
  postgres-data:
  redis-data:
  qdrant-data:
  caddy-data:
  caddy-config:

networks:
  af-forge-internal:
    driver: bridge
