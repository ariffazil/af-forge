# GEOX Earth Intelligence Core — Local VPS Deployment
# DITEMPA BUKAN DIBERI
# Version: v2026.04.11-ACP

version: '3.8'

services:
  # MCP Server (Earth Intelligence Core)
  GEOX:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: GEOX_eic
    ports:
      - "8000:8000"
    environment:
      - GEOX_MODE=research
      - GEOX_VERSION=v2026.04.11-ACP
      - F13_HUMAN_VETO=required
      - PYTHONUNBUFFERED=1
      # Gemini API key should be injected at runtime
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./data:/data:ro
      - vault_999:/app/999_vault
      - ./GEOX_mcp_server.py:/app/GEOX_mcp_server.py:ro
      - ./GEOX_mcp_server_acp.py:/app/GEOX_mcp_server_acp.py:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - GEOX_network

  # GUI (React App with 5 Domain Views)
  gui:
    build:
      context: ./GEOX-gui
      dockerfile: Dockerfile
    container_name: GEOX_gui
    ports:
      - "3000:80"
    environment:
      - VITE_GEOX_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - GEOX
    networks:
      - GEOX_network

volumes:
  vault_999:
    driver: local

networks:
  GEOX_network:
    driver: bridge

