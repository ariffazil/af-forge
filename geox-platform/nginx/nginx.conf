events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # GEOX Site — All four surfaces on one domain
    server {
        listen 80;
        server_name geox.arif-fazil.com localhost;

        # ─── SURFACE 1: Site (Static) ───
        location / {
            proxy_pass http://geox-site:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebMCP manifest (served with site)
        location = /webmcp.manifest.json {
            proxy_pass http://geox-site:80/webmcp.manifest.json;
            add_header Content-Type application/json;
        }

        # ─── SURFACE 3: MCP (SSE) ───
        location /mcp {
            proxy_pass http://geox-mcp:8000/mcp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # MCP health check
        location /mcp/health {
            proxy_pass http://geox-mcp:8000/health;
        }

        # ─── SURFACE 4: A2A ───
        location /a2a {
            proxy_pass http://geox-a2a:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Remove /a2a prefix when forwarding
            rewrite ^/a2a(/.*)$ $1 break;
        }

        # A2A health
        location /a2a/health {
            proxy_pass http://geox-a2a:3002/health;
        }
    }
}
