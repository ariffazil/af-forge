events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # GEOX Site — All four surfaces on one domain
    server {
        listen 80;
        server_name geox.arif-fazil.com localhost;

        # ─── SURFACE 1: Site (Static) ───
        location / {
            proxy_pass http://geox-site:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── SURFACE 2: WebMCP Manifest ───
        # Serve from site root (apps/site/webmcp.manifest.json)
        location = /webmcp.manifest.json {
            proxy_pass http://geox-site:80/webmcp.manifest.json;
            add_header Content-Type application/json;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebMCP app files
        location ^~ /webmcp/ {
            proxy_pass http://geox-site:80/webmcp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── SURFACE 3: MCP Server (/mcp/*) ───
        # Canonical redirect: /mcp → /mcp/
        location = /mcp {
            return 308 /mcp/;
        }

        location ^~ /mcp/ {
            # Strip /mcp prefix: /mcp/foo -> /foo
            rewrite ^/mcp/(.*) /$1 break;
            
            proxy_pass http://geox-mcp:8000/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # MCP health check
        location /mcp/health {
            proxy_pass http://geox-mcp:8000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── SURFACE 4: A2A Gateway (/a2a/*) ───
        # Canonical redirect: /a2a → /a2a/
        location = /a2a {
            return 308 /a2a/;
        }

        location ^~ /a2a/ {
            # Strip /a2a prefix: /a2a/foo -> /foo
            rewrite ^/a2a/(.*) /$1 break;
            
            proxy_pass http://geox-a2a:3002/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # A2A health
        location /a2a/health {
            proxy_pass http://geox-a2a:3002/health;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
