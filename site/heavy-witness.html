<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOX // HEAVY WITNESS // v1.0.0 (HEAVY TRUTH)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        :root {
            --bg-void: #0A0C0E;
            --accent-amber: #F59E0B;
            --accent-emerald: #10B981;
            --accent-crimson: #EF4444;
            --accent-purple: #8B5CF6;
            --accent-cyan: #06B6D4;
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(20, 24, 28, 0.6);
        }
        
        body {
            background-color: var(--bg-void);
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .scanline {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.3;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-void); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-amber); }

        .glow-amber { text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .glow-emerald { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .glow-purple { text-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        .glow-cyan { text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        
        @keyframes sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }
        .radar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 10%;
            background: linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.1));
            animation: sweep 8s linear infinite; pointer-events: none;
        }
        
        @keyframes pulse-border { 0% { border-color: rgba(6, 182, 212, 0.3); } 50% { border-color: rgba(6, 182, 212, 0.8); } 100% { border-color: rgba(6, 182, 212, 0.3); } }
        .gcp-active { animation: pulse-border 2s infinite; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2D3748; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Activity, Layers, Box, Terminal, Shield, Zap, Target, 
            Cpu, Database, Crosshair, Map: MapIcon, Sliders,
            Ruler, Clock, ScanFace, Globe, CheckCircle2, AlertCircle,
            Network, ArrowRightLeft, DatabaseZap, Search
        } = lucide;

        // Custom Icon Wrapper for Lucide (CDN compatible)
        const Icon = ({ name, size = 16, className = "" }) => {
            const LucideIcon = lucide[name] || Activity;
            return <LucideIcon size={size} className={className} />;
        };

        // --- GEMINI API INTEGRATION HOOK ---
        const useGeminiAPI = () => {
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            const generate = async (prompt, systemInstruction) => {
                setIsLoading(true);
                setError(null);
                const apiKey = ""; // User would provide this
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction || "You are an elite, brutalist geological AI assistant embedded in the GEOX system." }] }
                };

                // Simulated success for demo if no key
                if (!apiKey) {
                    await new Promise(r => setTimeout(r, 1500));
                    setIsLoading(false);
                    return "ANALYSIS: Structural traps identified. Triple-combo parity confirmed. Gas/Water contact at 1560m MD. Recommend immediate volume metabolism.";
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    setIsLoading(false);
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "NO_INTELLIGENCE_FOUND";
                } catch (err) {
                    setIsLoading(false);
                    setError(err.message);
                    return "API_ERROR";
                }
            };
            return { generate, isLoading, error };
        };

        // --- COMPONENTS ---
        const Badge = ({ children, color = "amber", className = "" }) => {
            const colors = {
                amber: "border-amber-500/30 text-amber-500 bg-amber-500/10",
                emerald: "border-emerald-500/30 text-emerald-500 bg-emerald-500/10",
                slate: "border-slate-500/30 text-slate-400 bg-slate-500/10",
                crimson: "border-red-500/30 text-red-500 bg-red-500/10",
                purple: "border-purple-500/30 text-purple-400 bg-purple-500/10",
                cyan: "border-cyan-500/30 text-cyan-400 bg-cyan-500/10",
            };
            return (
                <span className={`px-1.5 py-0.5 text-[10px] font-mono border rounded uppercase tracking-wider ${colors[color]} ${className}`}>
                    {children}
                </span>
            );
        };

        // --- DOMAIN: 1D WELL (TRIPLE COMBO) ---
        const Domain1D = () => {
            const { generate, isLoading } = useGeminiAPI();
            const [llmInterpret, setLlmInterpret] = useState('');
            const [calibrated, setCalibrated] = useState(false);

            const depthPoints = 120;
            const trackHeight = 600;
            const trackWidth = 150;

            const syntheticLogs = Array.from({ length: depthPoints }, (_, i) => {
                let gr, resDeep, resShal, den, neu;
                const noise = () => (Math.random() - 0.5) * 0.1;
                if (i >= 40 && i < 60) { // Gas Sand
                    gr = 30 + noise() * 50; resDeep = 200 + noise() * 500; resShal = 180 + noise() * 400; den = 2.05 + noise() * 0.1; neu = 0.12 + noise() * 0.05; 
                } else if (i >= 60 && i < 80) { // Water Sand
                    gr = 35 + noise() * 50; resDeep = 2 + noise() * 5; resShal = 1.5 + noise() * 3; den = 2.25 + noise() * 0.1; neu = 0.28 + noise() * 0.05;
                } else { // Shale
                    gr = 110 + noise() * 100; resDeep = 3 + noise() * 8; resShal = 3 + noise() * 8; den = 2.55 + noise() * 0.1; neu = 0.35 + noise() * 0.05;
                }
                return { gr, resDeep, resShal, den, neu, height: i };
            });

            const getPoints = (key, min, max, log = false) => {
                return syntheticLogs.map((p, i) => {
                    const y = (i / (depthPoints - 1)) * trackHeight;
                    const val = p[key];
                    let x = log ? ((Math.log10(val) - Math.log10(min)) / (Math.log10(max) - Math.log10(min))) * trackWidth : ((val - min) / (max - min)) * trackWidth;
                    return `${Math.max(0, Math.min(trackWidth, x))},${y}`;
                }).join(' ');
            };

            const getCrossoverPolygon = () => {
                let paths = []; let points = []; let active = false;
                const denMin = 1.95, denMax = 2.95, neuMin = 0.45, neuMax = -0.15;
                syntheticLogs.forEach((p, i) => {
                    const y = (i / (depthPoints - 1)) * trackHeight;
                    const dx = ((p.den - denMin) / (denMax - denMin)) * trackWidth;
                    const nx = ((p.neu - neuMin) / (neuMax - neuMin)) * trackWidth;
                    if (nx < dx) {
                        if (!active) { active = true; points = []; }
                        points.push({ nx, dx, y });
                    } else if (active) {
                        active = false;
                        const r = [...points].reverse().map(pt => `${pt.dx},${pt.y}`);
                        const l = points.map(pt => `${pt.nx},${pt.y}`);
                        paths.push([...l, ...r].join(' '));
                    }
                });
                return paths;
            };

            return (
                <div className="flex flex-col h-full gap-4 p-4 fade-in">
                    <div className="flex justify-between items-end border-b border-gray-800 pb-2">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="Target" className="text-emerald-500" /> 1D_WELL [TRIPLE COMBO]</h2>
                        <div className="flex gap-2"><Badge color="emerald">F2: TRUTH</Badge><Badge color="cyan">SCALE LOCKED</Badge></div>
                    </div>
                    <div className="flex-1 flex gap-2 relative glass-panel p-2">
                        <div className="scanline" />
                        <div className="flex-1 flex flex-col border-r border-gray-800">
                            <div className="h-10 text-[10px] text-green-500 font-bold border-b border-gray-800 flex items-center justify-center bg-black/40">GR (API)</div>
                            <div className="flex-1 bg-black/60 relative">
                                <svg width="100%" height="100%" viewBox={`0 0 ${trackWidth} ${trackHeight}`} preserveAspectRatio="none">
                                    <polyline points={getPoints('gr', 0, 150)} fill="none" stroke="#22c55e" strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
                                </svg>
                            </div>
                        </div>
                        <div className="w-12 border-r border-gray-800 flex flex-col bg-gray-900/40">
                            <div className="h-10 text-[9px] text-slate-500 font-mono border-b border-gray-800 flex items-center justify-center">DEPTH</div>
                            <div className="flex-1 flex flex-col justify-between py-2 text-[10px] font-mono text-center text-gray-500 italic">
                                {[...Array(11)].map((_, i) => <div key={i}>{1500 + i * 10}</div>)}
                            </div>
                        </div>
                        <div className="flex-1 flex flex-col border-r border-gray-800">
                            <div className="h-10 text-[10px] text-red-500 font-bold border-b border-gray-800 flex items-center justify-center bg-black/40">RES (Ωm)</div>
                            <div className="flex-1 bg-black/60">
                                <svg width="100%" height="100%" viewBox={`0 0 ${trackWidth} ${trackHeight}`} preserveAspectRatio="none">
                                    <polyline points={getPoints('resDeep', 0.2, 2000, true)} fill="none" stroke="#ef4444" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                </svg>
                            </div>
                        </div>
                        <div className="flex-1 flex flex-col">
                            <div className="h-10 text-[10px] text-amber-500 font-bold border-b border-gray-800 flex items-center justify-center bg-black/40">RHOB/NPHI</div>
                            <div className="flex-1 bg-black/60 relative">
                                <svg width="100%" height="100%" viewBox={`0 0 ${trackWidth} ${trackHeight}`} preserveAspectRatio="none">
                                    {getCrossoverPolygon().map((p, i) => <polygon key={i} points={p} fill="rgba(245, 158, 11, 0.3)" />)}
                                    <polyline points={getPoints('den', 1.95, 2.95)} fill="none" stroke="#f59e0b" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                    <polyline points={getPoints('neu', 0.45, -0.15)} fill="none" stroke="#60a5fa" strokeWidth="1.5" strokeDasharray="3,3" vectorEffect="non-scaling-stroke" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- DOMAIN: 2D SEISMIC (SEG-Y EMULATOR) ---
        const Domain2D = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const c = canvasRef.current; const ctx = c.getContext('2d');
                c.width = c.offsetWidth; c.height = c.offsetHeight;
                const w = c.width; const h = c.height;
                const imgData = ctx.createImageData(w, h); const d = imgData.data;
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        let fy = y; if (x > w * 0.4 && x < w * 0.6) fy -= (x - w * 0.4) * 0.5;
                        const h1 = h * 0.3 + Math.sin(x/w * 10) * 30;
                        const h2 = h * 0.6 + Math.cos(x/w * 8) * 40;
                        let amp = Math.sin(fy * 0.5) * Math.cos(x * 0.05) + (Math.random() - 0.5) * 0.5;
                        if (Math.abs(fy - h1) < 15) amp += 3.0;
                        if (Math.abs(fy - h2) < 20) amp -= 2.5;
                        const idx = (y * w + x) * 4;
                        if (amp > 1) { d[idx]=200; d[idx+1]=20; d[idx+2]=20; }
                        else if (amp < -1) { d[idx]=20; d[idx+1]=20; d[idx+2]=200; }
                        else { const i=50+amp*20; d[idx]=i; d[idx+1]=i; d[idx+2]=i; }
                        d[idx+3]=255;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }, []);
            return (
                <div className="flex flex-col h-full gap-4 p-4 fade-in">
                    <div className="flex justify-between items-end border-b border-gray-800 pb-2 text-blue-500 font-bold uppercase tracking-widest"><Icon name="Layers" /> 2D_SEIS // SEG-Y EMULATOR</div>
                    <div className="flex-1 glass-panel relative overflow-hidden bg-black"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full opacity-80" /><div className="scanline" /></div>
                </div>
            );
        };

        // --- DOMAIN: 3D META (MACROSTRAT REALITY BRIDGE) ---
        const Domain3D = () => (
            <div className="flex flex-col h-full gap-4 p-4 fade-in">
                <div className="flex justify-between items-end border-b border-gray-800 pb-2 text-purple-500 font-bold uppercase tracking-widest"><Icon name="Globe" /> 3D_META // MACROSTRAT REALITY BRIDGE</div>
                <div className="flex-1 glass-panel relative overflow-hidden bg-black">
                     <iframe src="https://macrostrat.org/map/#/z=5.0/x=103.0/y=5.0/bedrock/lines/" className="absolute inset-0 w-full h-full border-0 opacity-70 grayscale invert contrast-125" />
                     <div className="absolute top-2 left-2 z-20 bg-black/80 border border-purple-500/30 p-2 text-[10px] font-mono text-purple-400">CRS: [LON 103, LAT 5] // MALAY BASIN</div>
                </div>
            </div>
        );

        // --- DOMAIN: VOID / LEM ---
        const DomainLEM = () => (
            <div className="p-10 flex flex-col items-center justify-center h-full gap-4 text-center">
                <Icon name="Network" size={48} className="text-purple-500" />
                <h1 className="text-3xl font-bold tracking-[0.3em]">LEM METABOLIZER</h1>
                <p className="font-mono text-slate-500">EARTH.CANON_9 STATE ENGINE ACTIVE. READY FOR BACK-PROPAGATION.</p>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeDomain, setActiveDomain] = useState('1d');
            const [time, setTime] = useState('');
            const { generate: generateTerminal, isLoading: isTerminalLoading } = useGeminiAPI();
            const [terminalInput, setTerminalInput] = useState('');
            const [terminalLog, setTerminalLog] = useState([ { sender: 'sys', text: '> CANON_9 Initialized...' }, { sender: 'sys', text: '> Inverse Mapping Ready...' }, { sender: 'sys', text: '> 888 Judge Acknowledged.' } ]);
            const terminalEndRef = useRef(null);

            useEffect(() => {
                const int = setInterval(() => { const d = new Date(); setTime(`${d.getUTCHours().toString().padStart(2,'0')}${d.getUTCMinutes().toString().padStart(2,'0')}Z`); }, 1000);
                return () => clearInterval(int);
            }, []);

            useEffect(() => { terminalEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [terminalLog, isTerminalLoading]);

            const handleTerminalSubmit = async (e) => {
                e.preventDefault(); if (!terminalInput.trim() || isTerminalLoading) return;
                const txt = terminalInput.trim(); setTerminalInput('');
                setTerminalLog(prev => [...prev, { sender: 'user', text: `> USER: ${txt}` }]);
                const res = await generateTerminal(`Context: Domain ${activeDomain.toUpperCase()}. User says: "${txt}". Response:`);
                setTerminalLog(prev => [...prev, { sender: 'geox', text: `> GEOX: ${res}` }]);
            };

            return (
                <div className="h-screen flex flex-col bg-[#0A0C0E]">
                    <header className="h-12 border-b border-white/5 flex items-center justify-between px-4 bg-black/50 z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <Icon name="Database" className="text-amber-500" size={20} />
                            <h1 className="font-bold tracking-[0.2em] text-sm uppercase">GEOX // HEAVY WITNESS</h1>
                        </div>
                        <div className="flex items-center gap-4"><Badge color="cyan">CANON_9 LOCKED</Badge><Badge color="amber">888_JUDGE</Badge></div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-64 border-r border-white/5 flex flex-col bg-black/30 z-10">
                            <div className="flex-1 py-4 flex flex-col gap-2">
                                {[ { id: 'void', label: 'VOID [000-249]', icon: 'Activity' }, { id: '1d', label: '1D WELL [250-499]', icon: 'Target' }, { id: '2d', label: '2D SEIS [500-749]', icon: 'Layers' }, { id: '3d', label: '3D META [750-999]', icon: 'Globe' }, { id: 'lem', label: 'LEM METABOLIZER', icon: 'Network' } ].map(d => (
                                    <button key={d.id} onClick={() => setActiveDomain(d.id)} className={`flex items-center gap-3 px-4 py-3 border-l-2 transition-all ${activeDomain === d.id ? 'border-amber-500 bg-amber-500/10 text-amber-500' : 'border-transparent text-slate-500 hover:text-slate-300'}`}>
                                        <Icon name={d.icon} size={18} /> <span className="text-xs font-mono uppercase tracking-widest">{d.label}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="h-64 border-t border-white/5 p-4 flex flex-col gap-2 bg-black/60 shadow-2xl">
                                <div className="text-[10px] text-slate-500 font-mono uppercase border-b border-white/5 pb-1">AGI TERMINAL</div>
                                <div className="flex-1 overflow-y-auto text-[9px] font-mono flex flex-col gap-1 custom-scrollbar">
                                    {terminalLog.map((l, i) => <div key={i} className={l.sender === 'user' ? 'text-slate-400' : l.sender === 'geox' ? 'text-amber-500' : 'text-emerald-700'}>{l.text}</div>)}
                                    {isTerminalLoading && <div className="text-purple-500 animate-pulse">{'>'} SYNTHESIZING...</div>}
                                    <div ref={terminalEndRef} />
                                </div>
                                <form onSubmit={handleTerminalSubmit} className="mt-2 border border-white/10 p-1.5 flex gap-2">
                                    <Icon name="Terminal" size={12} />
                                    <input type="text" value={terminalInput} onChange={e => setTerminalInput(e.target.value)} placeholder="QUERY AGI..." className="bg-transparent border-none outline-none text-[9px] font-mono text-amber-100 flex-1" />
                                </form>
                            </div>
                        </aside>
                        <main className="flex-1 bg-gradient-to-br from-[#0A0C0E] to-[#12161b] relative overflow-hidden">
                            {activeDomain === 'void' && <DomainLEM />}
                            {activeDomain === '1d' && <Domain1D />}
                            {activeDomain === '2d' && <Domain2D />}
                            {activeDomain === '3d' && <Domain3D />}
                            {activeDomain === 'lem' && <DomainLEM />}
                        </main>
                    </div>
                    <footer className="h-8 border-t border-white/5 bg-black/40 flex items-center justify-between px-4 text-[9px] font-mono text-slate-600 tracking-widest">
                        <span>GEOX_CORE_v1.0.0 // HEAVY TRUTH EDITION</span>
                        <span className="text-amber-600 font-bold">DITEMPA BUKAN DIBERI // 999_SEAL</span>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
