name: AF-FORGE CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: node dist/test/PlanValidator.test.js
      - run: node dist/test/confidence.test.js
      - run: node dist/test/sense.test.js
      - run: node dist/test/governanceViolation.test.js
      - run: node dist/test/ticketStore.test.js
      - run: node dist/test/operatorConsole.test.js
